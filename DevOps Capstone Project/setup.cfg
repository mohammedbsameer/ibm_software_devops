[nosetests]
verbosity=2
with-spec=1
spec-color=1
with-coverage=1
cover-erase=1
cover-package=service

[coverage:report]
show_missing = True

[flake8]
ignore = E303,W503
max-line-length = 127
exclude = .git,__pycache__,venv,build,dist

[pylint]
max-line-length = 127
disable = C0111,C0103,R0903,W0613

[pylint.messages control]
disable = missing-docstring,invalid-name,too-few-public-methods,unused-argument
